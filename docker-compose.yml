services:
  db:
    image: postgres:16-alpine
    container_name: saman_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saman_secret}
      POSTGRES_DB: ${POSTGRES_DB:-saman}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saman}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: saman_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: saman_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saman}:${POSTGRES_PASSWORD:-saman_secret}@db:5432/${POSTGRES_DB:-saman}?schema=public
      NODE_ENV: production
    env_file:
      - .env
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: saman_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    ports:
      - "3000:3000"

volumes:
  db_data:
  minio_data:
